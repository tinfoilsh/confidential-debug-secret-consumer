shim-version: v0.3.18@sha256:7d9f98be78c91ede89f43c948a12d084fae34312effe9395ca7ed572991cb561
cvm-version: 0.10.7
cpus: 4
memory: 4096

networks:
  web:
    egress: open

containers:
  - name: "secret-consumer"
    image: "secret-consumer:dev"
    restart: always
    networks: [web]
    env:
      - STORAGE_URL: "https://confidential-secret-storage.dev-launch.tinfoil.dev"
      - AUTO_PULL: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

shim:
  listen-port: 443
  upstream-port: 8089
  paths:
    - /health
    - /pull-now
    - /received
